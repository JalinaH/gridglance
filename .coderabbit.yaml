# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
  path_instructions:
    - path: "lib/**"
      instructions: |
        This is a Flutter/Dart mobile app (GridGlance - an F1 companion app).
        State management uses stateful widgets with local state (no Provider/Riverpod/Bloc).
        Models use manual fromJson() factories — no code generation.
        API calls go through a single ApiService class with built-in HTTP caching.
    - path: "android/**"
      instructions: |
        Android native code for home screen widget providers and MethodChannel bridges.
    - path: "ios/**"
      instructions: |
        iOS native code including WidgetKit extensions (iOS 14+).
        Uses App Groups (group.com.gridglance.app) for widget data sharing.
    - path: "test/**"
      instructions: |
        Unit tests for models, utils, and services.

chat:
  auto_reply: true
