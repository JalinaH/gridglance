name: Widget Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: widget-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  widget-tests:
    name: Run Widget & UI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run screen tests
        run: flutter test test/screens/ --reporter expanded

      - name: Run widget tests
        run: flutter test test/widgets/ --reporter expanded
