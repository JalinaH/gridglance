name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
        run: |
          mkdir -p android/app/keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore/upload-keystore.jks
          echo "$KEY_PROPERTIES" > android/key.properties

      # The Sentry/PostHog SDKs read their keys at app startup via
      # String.fromEnvironment, which is populated from this file at build
      # time. Failing the build when a secret is missing prevents silently
      # shipping releases with no telemetry.
      - name: Write secrets.json
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
        run: |
          if [ -z "$SENTRY_DSN" ] || [ -z "$POSTHOG_KEY" ] || [ -z "$POSTHOG_HOST" ]; then
            echo "::error::Missing required secret(s). Set SENTRY_DSN, POSTHOG_KEY, and POSTHOG_HOST in repo settings."
            exit 1
          fi
          cat > secrets.json <<EOF
          {
            "SENTRY_DSN": "$SENTRY_DSN",
            "POSTHOG_KEY": "$POSTHOG_KEY",
            "POSTHOG_HOST": "$POSTHOG_HOST"
          }
          EOF

      - name: Build release APK
        run: flutter build apk --release --dart-define-from-file=secrets.json

      - name: Build release App Bundle
        run: flutter build appbundle --release --dart-define-from-file=secrets.json

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: artifacts/

      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/app-release.apk
            artifacts/app-release.aab
